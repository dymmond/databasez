version: 3

tasks:
  ruff:
    desc: Runs ruff linting checks
    cmds:
      - hatch run ruff

  lint:
    desc: Runs linting checks (ruff + ty)
    cmds:
      - hatch run lint

  format:
    desc: Formats the codebase and re-runs checks
    cmds:
      - hatch run format

  ty:
    desc: Runs type checking with ty
    cmds:
      - hatch run test:check_types

  docs_prepare:
    desc: Prepares documentation sources for Zensical
    cmds:
      - hatch run docs:prepare

  docs_clean:
    desc: Cleans generated docs artifacts
    cmds:
      - hatch run docs:clean

  build:
    desc: Builds the documentation
    cmds:
      - hatch run docs:build

  serve:
    desc: Runs the documentation in live mode
    cmds:
      - hatch run docs:serve

  serve_dev:
    desc: Runs the documentation in dev mode
    cmds:
      - hatch run docs:dev
